px}.library .arrow{color:#3b62d0;font-size:18px}.library .modes{display:flex;gap:5px}.library .modes i{width:15px;height:15px;border-radius:50%;border:1px solid #aeb7bf}.library .modes i:last-child{border-color:#1b2731;background:#1b2731}

<body>
  <main class="page">
    <header class="intro"><div><p class="eyebrow">RAGENT · UNIFIED UI DIRECTION</p><h1>聊天端与管理后台，统一成哪一种气质？</h1><p>三套方案都包含新布局、亮暗主题和响应式设计。点击你最喜欢的一套；最终实现会沿用现有功能，不会只做一张静态皮肤。</p></div><div class="hint">点击卡片完成选择</div></header>
    <section class="grid">
      <button class="option" type="button" data-choice="a" onclick="toggleSelect(this)"><span class="choice">A</span><div class="preview shell workbench"><div class="window"><aside class="rail"><div class="brand">R</div><div class="icon active">问</div><div class="icon">知</div><div class="icon">迹</div><div class="spacer"></div><div class="icon">◐</div><div class="avatar" style="background:#6f8e99"></div></aside><main class="stage"><header class="top"><div class="dots"><i></i><i></i><i></i></div><div class="status tiny"><i></i>知识索引已就绪</div><span class="pill" style="background:#e2ecee;color:#42616d">工作台</span></header><div class="body"><aside class="sessions"><div class="tiny" style="color:#91a1a8;margin:3px 8px 10px">最近会话</div><div class="session active">混合检索的作用</div><div class="session">知识库接入规范</div><div class="session">员工福利制度</div><div class="tiny" style="color:#91a1a8;margin:15px 8px 7px">空间</div><div class="session">产品研发</div><div class="session">公司制度</div></aside><section class="chat"><div class="label">ASK · RETRIEVE · VERIFY</div><h3>从企业知识里，<br>找到可信答案。</h3><p class="deck">回答与证据在同一条阅读路径中完成。</p><div class="answer"><p><b>混合检索</b>同时利用语义相似度和关键词精确匹配，可以覆盖概念表达差异，并保留专业术语的命中能力。 <span class="cite">[01]</span></p><p>随后通过重排序缩小候选范围，让最终上下文更贴近用户问题。 <span class="cite">[02]</span></p></div><div class="composer"><span>继续追问，或输入 / 选择知识空间</span><span class="send">↑</span></div></section><aside class="context"><b>答案依据 · 2</b><div class="source"><strong>01 · 检索架构</strong><br>混合召回策略说明</div><div class="source"><strong>02 · 重排序</strong><br>候选片段评估规范</div><b style="margin-top:16px">主题预览</b><div class="theme-pair"><span class="light"></span><span class="dark"></span></div></aside></div></main></div></div><div class="meta"><div class="meta-top"><h2>知识工作台</h2><span class="tag">推荐</span></div><p>深海蓝、雾面青与珊瑚信号色。聊天是主画布，引用证据形成连续“证据带”；后台沿用同一导航骨架，兼顾亲和力与专业度。</p><div class="trade"><span><b>优势</b>统一感强，长时间使用舒适</span><span><b>取舍</b>改造范围较大，但价值最高</span></div></div></button>
      <button class="option" type="button" data-choice="b" onclick="toggleSelect(this)"><span class="choice">B</span><div class="preview shell library"><div class="window"><header class="top"><div class="mark">Ragent <span>Index</span></div><nav class="nav"><b>问答</b><span>知识库</span><span>运行记录</span><span>系统</span></nav><div class="modes"><i></i><i></i></div></header><div class="body"><aside class="index"><div class="index-title">知识目录</div><div class="chapter active">01<br>研究问答</div><div class="chapter">02<br>知识文献</div><div class="chapter">03<br>检索记录</div><div class="chapter">04<br>系统管理</div></aside><main class="paper"><div class="folio">KNOWLEDGE NOTE · 2026 / 0714</div><h3>让每一个回答，<br>都有清晰出处。</h3><p class="deck">以文献目录、脚注与证据索引组织知识检索。</p><div class="rule"></div><div class="query">“请解释向量召回、关键词召回与重排序之间的关系。”</div><div class="footnotes"><div class="note"><b>[01] 向量召回</b><br>通过语义嵌入寻找表达不同但含义相近的内容。</div><div class="note"><b>[02] 关键词召回</b><br>保留专有名词、编号与精确短语的匹配能力。</div></div><div class="composer"><span>写下一个需要查证的问题</span><span class="arrow">→</span></div></main></div></div></div><div class="meta"><div class="meta-top"><h2>证据图书馆</h2><span class="tag">阅读优先</span></div><p>冷白纸张、墨蓝与索引钴蓝。布局像现代资料库，引用最突出，暗色主题则转成“夜间阅览室”，适合强调知识可信度。</p><div class="trade"><span><b>优势</b>内容层级清楚，辨识度高</span><span><b>取舍</b>管理后台的数据密度略受限</span></div></div></button>
      <button class="option" type="button" data-choice="c" onclick="toggleSelect(this)"><span class="choice">C</span><div class="preview shell console"><div class="window"><aside class="side"><div class="logo">RAGENT<span>//OPS</span></div><div class="menu active">问答控制台</div><div class="menu">知识索引</div><div class="menu">意图树</div><div class="menu">链路追踪</div><div class="menu">系统设置</div><div class="version">CORE 1.2.0<br>INDEX ONLINE</div></aside><main class="main"><header class="top"><div class="tiny">workspace / retrieval</div><div class="live tiny"><i></i>LIVE</div><span class="pill" style="border:1px solid #344555">LIGHT / DARK</span></header><div class="workspace"><section class="canvas"><div class="kicker">RETRIEVAL CONSOLE</div><h3>观察每一次<br>检索与生成</h3><div class="pipeline"><div class="step"><i></i>QUERY</div><div class="step on"><i></i>RETRIEVE</div><div class="step"><i></i>ANSWER</div></div><div class="answer"><b>当前回答</b><br>系统已召回 24 个候选片段，经重排序保留 6 个高相关证据，并开始生成最终答案。</div><div class="command"><span>&gt; 输入问题或运行指令_</span><span class="run">RUN ↗</span></div></section><aside class="metrics"><div class="metrics-title">LIVE METRICS</div><div class="metric"><strong>24</strong><span>候选片段</span></div><div class="metric"><strong>06</strong><span>引用证据</span></div><div class="metric"><strong>1.8s</strong><span>总耗时</span></div><div class="spark"><i style="height:35%"></i><i style="height:70%"></i><i style="height:52%"></i><i style="height:86%"></i><i style="height:62%"></i><i style="height:45%"></i></div><div class="modes">主题：<b>系统暗色</b></div></aside></div></main></div></div><div class="meta"><div class="meta-top"><h2>检索驾驶舱</h2><span class="tag">工程向</span></div><p>石墨黑、钢蓝与珊瑚红。把检索链路、指标和状态作为主视觉；管理后台表现最强，聊天端更像专业工程工具。</p><div class="trade"><span><b>优势</b>数据密度高，技术感鲜明</span><span><b>取舍</b>普通用户会感到稍硬核</span></div></div></button>
    </section>
    <p class="footer">这一步只选择整体方向；下一步再确认布局细节与亮暗主题行为。</p>
  </main>
